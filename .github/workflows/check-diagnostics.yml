name: Check diagnostics

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]' && github.event.pull_request.head.ref == 'agent/cleanup-template-files'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: npm ci
      - run: npm run check > check-diagnostics.log 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add check-diagnostics.log
          git commit -m "Capture TypeScript diagnostics"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
